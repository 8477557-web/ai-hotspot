name: Daily AI News Update

on:
  schedule:
    # 北京时间每天早上8:00 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]

# GitHub Pages部署权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt python-dateutil

      - name: Fetch RSS news
        run: python scripts/fetch_news.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: AI Pipeline (filter + score + crowd verify + topics + report)
        run: python scripts/main.py --ai-only --crowd-verify
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Track history
        run: python scripts/history_tracker.py

      - name: Copy history to web
        run: |
          mkdir -p web/data/history
          cp data/history/*.json web/data/history/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          publish_branch: gh-pages
          force_orphan: true
